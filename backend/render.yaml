services:
  - type: web
    name: offpath-api
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: FOURSQUARE_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: APPLE_CLIENT_ID
        value: com.offpath.app
      - key: APPLE_TEAM_ID
        value: 3V28XJ2KVM
      - key: APPLE_KEY_ID
        value: 7K24452538
      - key: APPLE_PRIVATE_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        value: 650828421062-engpkpdrm7lj2umolnfc9eugdbgq7mrb.apps.googleusercontent.com
      - key: DATABASE_URL
        fromDatabase:
          name: offpath-db
          property: connectionString

databases:
  - name: offpath-db
    databaseName: offpath
    plan: free
    region: frankfurt
