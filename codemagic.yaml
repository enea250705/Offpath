workflows:
  ios-distribution:
    name: Offpath iOS
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.offpath.app
      vars:
        XCODE_PROJECT: "ios/Offpath.xcodeproj"
        XCODE_SCHEME: "Offpath"
        BUNDLE_ID: "com.offpath.app"
        APP_STORE_APPLE_ID: 6760982389

    scripts:
      - name: Set Xcode version
        script: |
          sudo xcode-select -p

      - name: Install dependencies
        script: |
          cd ios
          xcodebuild -resolvePackageDependencies \
            -project Offpath.xcodeproj \
            -scheme Offpath \
            -clonedSourcePackagesDirPath ../derived_data

      - name: Build and archive
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --config Release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
